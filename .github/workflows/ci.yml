name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - run: bundle exec rubocop
      # Gemfile.lock non è versionato: lo generiamo per dare a bundler-audit qualcosa da analizzare.
      - run: bundle lock
      - run: bundle exec bundler-audit check --update
      - run: COVERAGE_ENFORCE=1 bundle exec rspec
